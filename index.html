<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
}

#banner {
  width: 300px;
  height: 250px;
  position: relative;
  overflow: hidden;
  cursor: pointer;
  font-family: Arial, sans-serif;
}

/* BAGGRUND */
#bg {
  position: absolute;
  width: 100%;
  height: 100%;
  background: url("https://kim4690.github.io/BEWI-300/BygTek_300x250_mar26_atlas_1.png") no-repeat center;
  background-size: cover;
}

/* TEKST */
#text {
  position: absolute;
  bottom: 50px;
  left: 15px;
  color: white;
  font-size: 16px;
  font-weight: bold;
  opacity: 0;
  transform: translateY(20px);
  transition: all 0.6s ease;
}

/* CTA */
#cta {
  position: absolute;
  bottom: 15px;
  left: 15px;
  background: #000;
  color: #fff;
  padding: 6px 12px;
  font-size: 12px;
  opacity: 0;
  transition: all 0.6s ease;
}

/* ANIMATION */
.show #text {
  opacity: 1;
  transform: translateY(0);
}

.show #cta {
  opacity: 1;
}
</style>
</head>

<body>

<div id="banner">
  <div id="bg"></div>
  <div id="text">Effektiv tagisolering</div>
  <div id="cta">Læs mere</div>
</div>

<script>
var banner = document.getElementById("banner");

// simpel animation
setTimeout(function(){
  banner.classList.add("show");
}, 300);

// klik
banner.addEventListener("click", function(){
  window.open(
    "https://bewi.com/loesninger-brancher/tag?lang=da&utm_source=html5&utm_medium=fp&utm_campaign=Tagisolering",
    "_blank"
  );
});
</script>

</body>
</html>
