<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://code.createjs.com/1.0.0/createjs.min.js"></script>

<script>
window.createjs = window.createjs || {};
window.AdobeAn = window.AdobeAn || {};
</script>

<script src="https://kim4690.github.io/BEWI-300/BygTek_300x250_mar26.js"></script>

<style>
body { margin:0; }

#banner-wrapper {
  position: relative;
  width:100%;
  max-width:300px;
  aspect-ratio:300/250;
}

canvas {
  width:100%;
  height:100%;
  display:block;
  cursor:pointer;
}

/* CTA */
#cta-overlay {
  position:absolute;
  bottom:18px;
  left:22px;

  width:84px;
  height:24px;

  border-radius:6px;

  background:
    url("https://kim4690.github.io/BEWI-300/BygTek_300x250_mar26_atlas_1.png") no-repeat,
    #ffffff;

  background-size:2000px 1333px;
  background-position:-966px -1335px;

  opacity:0;
  transform:translateY(20px);
  transition:all 0.4s ease;
}
</style>
</head>

<body>

<div id="banner-wrapper">
  <canvas id="canvas" width="300" height="250"></canvas>
  <div id="cta-overlay"></div>
</div>

<script>
var canvas = document.getElementById("canvas");

function init() {

  var comp = AdobeAn.getComposition("F76BD3534F92AF479E891204213A05E2");

  if (!comp) {
    setTimeout(init, 100);
    return;
  }

  var lib = comp.getLibrary();
  var loader = new createjs.LoadQueue(false);

  loader.addEventListener("fileload", function(evt){
    if (evt.item.type === "image") {
      lib.images = lib.images || {};
      lib.images[evt.item.id] = evt.result;
    }
  });

  loader.addEventListener("complete", function(){

    var ss = comp.getSpriteSheet();

    for (var i = 0; i < lib.ssMetadata.length; i++) {
      ss[lib.ssMetadata[i].name] = new createjs.SpriteSheet({
        images: [lib.images[lib.ssMetadata[i].name]],
        frames: lib.ssMetadata[i].frames
      });
    }

    var exportRoot = new lib.Untitled3();
    var stage = new lib.Stage(canvas);

    stage.addChild(exportRoot);

    createjs.Ticker.framerate = lib.properties.fps;

    // 🔥 SYNK CTA MED FRAME (KORREKT!)
    var cta = document.getElementById("cta-overlay");

    createjs.Ticker.addEventListener("tick", function(){

      stage.update();

      var frame = exportRoot.currentFrame;

      // 👉 CTA vises når den faktisk gør i animationen
      if (frame > 65) {
        cta.style.opacity = 1;
        cta.style.transform = "translateY(0)";
      }

    });

    exportRoot.gotoAndPlay(0);

    canvas.onclick = function(){
      window.open(
        "https://bewi.com/loesninger-brancher/tag?lang=da&utm_source=html5&utm_medium=fp&utm_campaign=Tagisolering",
        "_blank"
      );
    };

  });

  loader.loadManifest(lib.properties.manifest);
}

window.onload = init;
</script>

</body>
</html>
