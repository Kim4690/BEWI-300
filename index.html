<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">

<style>
body { margin:0; }

#banner {
  width:100%;
  max-width:300px;
  aspect-ratio:300/250;
  position:relative;
  overflow:hidden;
  font-family: Arial, sans-serif;
  cursor:pointer;
}

/* BAGGRUND */
#bg {
  position:absolute;
  width:100%;
  height:100%;
  background:url("https://kim4690.github.io/BEWI-300/BygTek_300x250_mar26_atlas_1.png") center/cover no-repeat;
}

/* OVERLAY (for læsbarhed) */
#overlay {
  position:absolute;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.25);
}

/* LOGO */
#logo {
  position:absolute;
  top:10px;
  right:10px;
  font-weight:bold;
  color:#fff;
  font-size:14px;
}

/* TEKSTER */
.text {
  position:absolute;
  left:15px;
  right:15px;
  color:#fff;
  opacity:0;
  transition:opacity 0.6s;
}

#text1 { top:40px; font-size:16px; }
#text2 { top:40px; font-size:16px; }

/* CTA */
#cta {
  position:absolute;
  bottom:15px;
  left:15px;
  background:#fff;
  color:#000;
  padding:6px 12px;
  font-size:12px;
  font-weight:bold;
  opacity:0;
  transform:translateY(20px);
  transition:all 0.6s;
}

/* ANIMATION */
.step1 #text1 { opacity:1; }
.step2 #text1 { opacity:0; }
.step3 #text2 { opacity:1; }

.step1 #cta,
.step3 #cta {
  opacity:1;
  transform:translateY(0);
}
</style>
</head>

<body>

<div id="banner">

  <div id="bg"></div>
  <div id="overlay"></div>

  <div id="logo">BEWI</div>

  <div id="text1" class="text">
  Effektiv isolering til byggeriet
</div>

<div id="text2" class="text">
  Tagisolering der sparer tid og energi
</div>

  <div id="cta">Læs mere</div>

</div>

<script>
var banner = document.getElementById("banner");

// step 1
setTimeout(()=>banner.classList.add("step1"), 2000);

// step 2
setTimeout(()=>banner.classList.add("step2"), 4000);

// step 3
setTimeout(()=>banner.classList.add("step3"), 5000);

// klik
banner.onclick = function(){
  window.open(
    "https://bewi.com/loesninger-brancher/tag?lang=da&utm_source=html5&utm_medium=fp&utm_campaign=Tagisolering",
    "_blank"
  );
};
</script>

</body>
</html>
