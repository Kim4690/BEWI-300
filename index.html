<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- CreateJS -->
<script src="https://code.createjs.com/1.0.0/createjs.min.js"></script>

<style>
html, body {
  margin: 0;
  padding: 0;
  background: #ffffff;
  overflow: hidden;
}

/* Responsiv banner */
#banner-wrapper {
  width: 100%;
  max-width: 300px;
  aspect-ratio: 300 / 250;
  margin: 0 auto;
  position: relative;
}

canvas {
  width: 100%;
  height: 100%;
  display: block;
  cursor: pointer;
}
</style>
</head>

<body>

<div id="banner-wrapper">
  <canvas id="canvas" width="300" height="250"></canvas>
</div>

<script>
// 🔥 LOAD DIN BANNER JS FRA GITHUB
var script = document.createElement("script");
script.src = "https://kim4690.github.io/BEWI-300/banner.js";";";

script.onload = function() {

  var canvas = document.getElementById("canvas");

  // Vent på Adobe composition
  function start() {
    var comp = AdobeAn.getComposition("F76BD3534F92AF479E891204213A05E2");

    if (!comp) {
      setTimeout(start, 100);
      return;
    }

    var lib = comp.getLibrary();
    var loader = new createjs.LoadQueue(false);

    loader.addEventListener("fileload", function(evt){
      if (evt.item.type === "image") {
        lib.images[evt.item.id] = evt.result;
      }
    });

    loader.addEventListener("complete", function(){

      var exportRoot = new lib.Untitled3();
      var stage = new lib.Stage(canvas);

      stage.addChild(exportRoot);
      createjs.Ticker.framerate = lib.properties.fps;
      createjs.Ticker.addEventListener("tick", stage);

      // 🔗 KLIK (HELE BANNERET)
      canvas.addEventListener("click", function(){
        window.open(
          "https://bewi.com/loesninger-brancher/tag?lang=da&utm_source=html5&utm_medium=fp&utm_campaign=Tagisolering%20",
          "_blank"
        );
      });

    });

    loader.loadManifest(lib.properties.manifest);
  }

  start();
};

document.head.appendChild(script);
</script>

</body>
</html>
