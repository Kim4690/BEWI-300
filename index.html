<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://code.createjs.com/1.0.0/createjs.min.js"></script>

<style>
html, body {
  margin: 0;
  padding: 0;
  width: 300px;
  height: 250px;
  overflow: hidden;
  background: #ffffff;
}

#banner-wrapper {
  width: 300px;
  height: 250px;
  position: relative;
}

canvas {
  width: 300px !important;
  height: 250px !important;
  display: block;
}
</style>
</head>

<body>

<div id="banner-wrapper">
  <canvas id="canvas" width="300" height="250"></canvas>
</div>

<script>
function startBanner() {

  var canvas = document.getElementById("canvas");

  var comp = AdobeAn.getComposition("F76BD3534F92AF479E891204213A05E2");
  if (!comp) {
    console.log("venter på AdobeAn...");
    setTimeout(startBanner, 100);
    return;
  }

  var lib = comp.getLibrary();

  var loader = new createjs.LoadQueue(false);

  loader.addEventListener("fileload", function(evt){
    if (evt.item.type === "image") {
      lib.images[evt.item.id] = evt.result;
    }
  });

  loader.addEventListener("complete", function(){

    var exportRoot = new lib.Untitled3();
    var stage = new lib.Stage(canvas);

    stage.addChild(exportRoot);
    createjs.Ticker.framerate = lib.properties.fps;
    createjs.Ticker.addEventListener("tick", stage);

    canvas.style.cursor = "pointer";
    canvas.addEventListener("click", function(){
      window.open(
        "https://bewi.com/loesninger-brancher/tag?lang=da&utm_source=html5&utm_medium=fp&utm_campaign=Tagisolering%20",
        "_blank"
      );
    });

  });

  loader.loadManifest(lib.properties.manifest);
}

// load banner JS
var s = document.createElement("script");
s.src = "https://kim4690.github.io/BEWI-300/BygTek_300x250_mar26.js";";
s.onload = startBanner;
document.head.appendChild(s);
</script>

</body>
</html>
