<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- CreateJS -->
<script src="https://code.createjs.com/1.0.0/createjs.min.js"></script>

<!-- 🔥 VIGTIG: global init -->
<script>
window.createjs = window.createjs || {};
window.AdobeAn = window.AdobeAn || {};
</script>

<!-- DIN ORIGINAL JS -->
<script src="https://kim4690.github.io/BEWI-300/BygTek_300x250_mar26.js"></script>

<style>
body {
  margin:0;
}

/* RESPONSIV WRAPPER */
#banner-wrapper {
  width:100%;
  max-width:300px;
  aspect-ratio:300/250;
}

/* CANVAS */
canvas {
  width:100%;
  height:100%;
  display:block;
  cursor:pointer;
}
</style>
</head>

<body>

<div id="banner-wrapper">
  <canvas id="canvas" width="300" height="250"></canvas>
</div>

<script>
var canvas = document.getElementById("canvas");

function init() {

  // 🔥 hent composition
  var comp = AdobeAn.getComposition("F76BD3534F92AF479E891204213A05E2");

  if (!comp) {
    console.log("❌ Composition ikke fundet endnu – prøver igen...");
    setTimeout(init, 100);
    return;
  }

  var lib = comp.getLibrary();
  var loader = new createjs.LoadQueue(false);

  // billeder
  loader.addEventListener("fileload", function(evt){
    if (evt.item.type === "image") {
      lib.images = lib.images || {};
      lib.images[evt.item.id] = evt.result;
    }
  });

  // når alt er loaded
  loader.addEventListener("complete", function(){

    // 🔥 spritesheet fix
    var ss = comp.getSpriteSheet();
    for (var i = 0; i < lib.ssMetadata.length; i++) {
      ss[lib.ssMetadata[i].name] = new createjs.SpriteSheet({
        images: [lib.images[lib.ssMetadata[i].name]],
        frames: lib.ssMetadata[i].frames
      });
    }

stage.addChild(exportRoot);

// 🔥 hvid CTA baggrund
var ctaBg = new createjs.Shape();
ctaBg.graphics.beginFill("#ffffff").drawRoundRect(0,0,85,25,4);

ctaBg.x = 20;
ctaBg.y = 210;

// tilføj EFTER exportRoot
stage.addChild(ctaBg);

// 🔥 læg den LIGE UNDER CTA (ikke helt bagved)
stage.setChildIndex(ctaBg, stage.getNumChildren() - 2);

ctaBg.x = 20;
ctaBg.y = 210;

// tilføj
stage.addChild(ctaBg);

// 🔥 sørg for den ligger BAG animationen
stage.setChildIndex(ctaBg, 0);

// position matcher animation
ctaBg.x = 20;
ctaBg.y = 210;

stage.addChild(ctaBg);
stage.setChildIndex(ctaBg, stage.getNumChildren()-1);

    // animation start
    createjs.Ticker.framerate = lib.properties.fps;
    createjs.Ticker.addEventListener("tick", stage);

    exportRoot.gotoAndPlay(0);

    // klik
    canvas.onclick = function(){
      window.open(
        "https://bewi.com/loesninger-brancher/tag?lang=da&utm_source=html5&utm_medium=fp&utm_campaign=Tagisolering",
        "_blank"
      );
    };

  });

  loader.loadManifest(lib.properties.manifest);
}

// 🔥 start når siden er klar
window.onload = init;
</script>

</body>
</html>
