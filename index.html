<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://code.createjs.com/1.0.0/createjs.min.js"></script>

<script>
window.createjs = window.createjs || {};
window.AdobeAn = window.AdobeAn || {};
</script>

<script src="https://kim4690.github.io/BEWI-300/BygTek_300x250_mar26.js"></script>

<style>
body { margin:0; }

#banner-wrapper {
  position: relative;
  width:100%;
  max-width:300px;
  aspect-ratio:300/250;

  margin: 0 auto; /* 🔥 CENTRERER */
}

canvas {
  width:100%;
  height:100%;
  display:block;
  cursor:pointer;
}

/* CTA container */
#cta-container {
  position:absolute;
  left:22px;
  bottom:18px;

  display:flex;
  flex-direction:column;
  gap:6px;

  opacity:0;
  transform:translateY(20px);
  transition:all 0.4s ease;
}

/* “Nysgerrig” tekst (øverste boks) */
#cta-top {
  width:140px;
  height:24px;

  background:url("https://kim4690.github.io/BEWI-300/BygTek_300x250_mar26_atlas_1.png") no-repeat;
  background-size:2000px 1333px;
  background-position:0px -1335px; /* text2 udsnit */

}

/* CTA knap */
#cta-btn {
  width:84px;
  height:24px;

  background:#ffffff;
  border-radius:6px;

  display:flex;
  align-items:center;
  justify-content:center;

  font-family:Arial, sans-serif;
  font-size:11px;
  font-weight:bold;
  color:#000; /* 🔥 sort tekst */
}
</style>
</head>

<body>

<div id="banner-wrapper">
  <canvas id="canvas" width="300" height="250"></canvas>

  <!-- CTA -->
  <div id="cta-container">
    <div id="cta-top"></div>
    <div id="cta-btn">Læs mere</div>
  </div>
</div>

<script>
var canvas = document.getElementById("canvas");

function init() {

  var comp = AdobeAn.getComposition("F76BD3534F92AF479E891204213A05E2");

  if (!comp) {
    setTimeout(init, 100);
    return;
  }

  var lib = comp.getLibrary();
  var loader = new createjs.LoadQueue(false);

  loader.addEventListener("fileload", function(evt){
    if (evt.item.type === "image") {
      lib.images = lib.images || {};
      lib.images[evt.item.id] = evt.result;
    }
  });

  loader.addEventListener("complete", function(){

    var ss = comp.getSpriteSheet();

    for (var i = 0; i < lib.ssMetadata.length; i++) {
      ss[lib.ssMetadata[i].name] = new createjs.SpriteSheet({
        images: [lib.images[lib.ssMetadata[i].name]],
        frames: lib.ssMetadata[i].frames
      });
    }

    var exportRoot = new lib.Untitled3();
    var stage = new lib.Stage(canvas);

    stage.addChild(exportRoot);

    createjs.Ticker.framerate = lib.properties.fps;

    var cta = document.getElementById("cta-container");

    createjs.Ticker.addEventListener("tick", function(){

      stage.update();

      var frame = exportRoot.currentFrame;

      // 🔥 RESET når animation starter forfra
      if (frame < 5) {
        cta.style.opacity = 0;
        cta.style.transform = "translateY(20px)";
      }

      // 🔥 VIS CTA KUN TIL SIDST
      if (frame > 140) {
        cta.style.opacity = 1;
        cta.style.transform = "translateY(0)";
      }

    });

    exportRoot.gotoAndPlay(0);

    canvas.onclick = function(){
      window.open(
        "https://bewi.com/loesninger-brancher/tag?lang=da&utm_source=html5&utm_medium=fp&utm_campaign=Tagisolering",
        "_blank"
      );
    };

  });

  loader.loadManifest(lib.properties.manifest);
}

window.onload = init;
</script>

</body>
</html>
