<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://code.createjs.com/1.0.0/createjs.min.js"></script>
<script src="BygTek_300x250_mar26.js"></script>

<style>
html, body {
  margin: 0;
  padding: 0;
  background: #ffffff;
  overflow: hidden;
}

#banner-wrapper {
  width: 100%;
  max-width: 300px;
  aspect-ratio: 300 / 250;
  margin: 0 auto;
}

canvas {
  width: 100%;
  height: 100%;
  display: block;
  cursor: pointer;
}
</style>
</head>

<body>

<div id="banner-wrapper">
  <canvas id="canvas" width="300" height="250"></canvas>
</div>

<script>
var canvas = document.getElementById("canvas");

function startBanner() {

  if (!window.AdobeAn || !AdobeAn.getComposition) {
    setTimeout(startBanner, 100);
    return;
  }

  var comp = AdobeAn.getComposition("F76BD3534F92AF479E891204213A05E2");

  if (!comp) {
    setTimeout(startBanner, 100);
    return;
  }

  var lib = comp.getLibrary();
  var queue = new createjs.LoadQueue(false);

 queue.addEventListener("complete", function(){

  // 🔥 GLOBAL spritesheet (det er hele pointen)
  window.ss["BygTek_300x250_mar26_atlas_1"] = new createjs.SpriteSheet({
    images: [lib.images["BygTek_300x250_mar26_atlas_1"]],
    frames: lib.ssMetadata[0].frames
  });

  var exportRoot = new lib.Untitled3();
  var stage = new lib.Stage(canvas);

  stage.addChild(exportRoot);
  createjs.Ticker.framerate = lib.properties.fps;
  createjs.Ticker.addEventListener("tick", stage);

  canvas.addEventListener("click", function(){
    window.open(
      "https://bewi.com/loesninger-brancher/tag?lang=da&utm_source=html5&utm_medium=fp&utm_campaign=Tagisolering%20",
      "_blank"
    );
  });

});

    // 🔥 KRITISK FIX (spritesheet)
    var ss = {};
    ss["BygTek_300x250_mar26_atlas_1"] = new createjs.SpriteSheet({
      images: [lib.images["BygTek_300x250_mar26_atlas_1"]],
      frames: lib.ssMetadata[0].frames
    });

    // Gør ss globalt (så din JS kan bruge den)
    window.ss = ss;

    var exportRoot = new lib.Untitled3();
    var stage = new lib.Stage(canvas);

    stage.addChild(exportRoot);
    createjs.Ticker.framerate = lib.properties.fps;
    createjs.Ticker.addEventListener("tick", stage);

    canvas.addEventListener("click", function(){
      window.open(
        "https://bewi.com/loesninger-brancher/tag?lang=da&utm_source=html5&utm_medium=fp&utm_campaign=Tagisolering%20",
        "_blank"
      );
    });

  });

  queue.loadManifest(lib.properties.manifest);
}

startBanner();
</script>

</body>
</html>
