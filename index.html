<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">

<style>
body { margin:0; }

#banner {
  width:300px;
  height:250px;
  position:relative;
  overflow:hidden;
  font-family: Arial, sans-serif;
  cursor:pointer;
  background:#000;
}

/* BAGGRUND */
#bg {
  position:absolute;
  width:100%;
  height:100%;
  background:url("https://kim4690.github.io/BEWI-300/BygTek_300x250_mar26_atlas_1.png") center/cover no-repeat;
  transform: scale(1.1);
  transition: transform 3s ease;
}

/* DARK OVERLAY */
#overlay {
  position:absolute;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.3);
}

/* TEKST */
#text {
  position:absolute;
  bottom:60px;
  left:15px;
  right:15px;
  color:#fff;
  font-size:16px;
  font-weight:bold;
  opacity:0;
  transform: translateY(20px);
  transition: all 0.6s ease;
}

/* CTA */
#cta {
  position:absolute;
  bottom:15px;
  left:15px;
  background:#fff;
  color:#000;
  padding:6px 12px;
  font-size:12px;
  font-weight:bold;
  opacity:0;
  transform: translateY(10px);
  transition: all 0.6s ease;
}

/* ANIMATION */
.show #bg {
  transform: scale(1);
}

.show #text {
  opacity:1;
  transform: translateY(0);
  transition-delay:0.5s;
}

.show #cta {
  opacity:1;
  transform: translateY(0);
  transition-delay:0.9s;
}
</style>
</head>

<body>

<div id="banner">
  <div id="bg"></div>
  <div id="overlay"></div>

  <div id="text">
    Effektiv tagisolering
  </div>

  <div id="cta">
    Læs mere
  </div>
</div>

<script>
var banner = document.getElementById("banner");

// start animation
setTimeout(function(){
  banner.classList.add("show");
}, 200);

// klik
banner.addEventListener("click", function(){
  window.open(
    "https://bewi.com/loesninger-brancher/tag?lang=da&utm_source=html5&utm_medium=fp&utm_campaign=Tagisolering",
    "_blank"
  );
});
</script>

</body>
